*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
header { background: #1a1a18; color: #f5f4f0; padding: 1.25rem 1.5rem 1rem; }
header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.02em; }
header p { font-size: 11px; opacity: .45; margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }
.stats { display: flex; gap: 16px; padding: 0.75rem 1.5rem; background: #1a1a18; border-top: 0.5px solid rgba(255,255,255,0.08); }
.stat { font-size: 12px; color: rgba(245,244,240,0.45); }
.stat strong { color: #f5f4f0; font-weight: 500; margin-right: 4px; }
.tabs-wrap { background: #fff; border-bottom: 0.5px solid #e0ddd6; overflow-x: auto; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; padding: 0 1.5rem; }
.tab { font-size: 12px; font-weight: 500; padding: 11px 12px; border: none; background: transparent; cursor: pointer; color: #999; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.12s; flex-shrink: 0; letter-spacing: 0.02em; }
.tab .cnt { font-size: 10px; font-weight: 400; opacity: .45; margin-left: 3px; }
.tab.active { color: #1a1a18; border-bottom-color: #1a1a18; }
.tab:hover:not(.active) { color: #1a1a18; }
.content { max-width: 680px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }
.day-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
.screening { display: grid; grid-template-columns: 48px 1fr; gap: 0 12px; padding: 10px 0; border-bottom: 0.5px solid #e8e5df; align-items: start; }
.screening:last-child { border-bottom: none; }
.time { font-size: 13px; font-weight: 500; color: #1a1a18; padding-top: 2px; font-variant-numeric: tabular-nums; }
.title-link { text-decoration: none; color: inherit; }
.title-link:hover .title { text-decoration: underline; text-underline-offset: 2px; }
.title { font-size: 14px; font-weight: 500; color: #1a1a18; line-height: 1.35; }
.meta { display: flex; align-items: center; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.venue { font-size: 12px; color: #666; }
.seat { font-size: 12px; color: #bbb; }
.dur { font-size: 11px; color: #888; background: #f0ede8; border-radius: 3px; padding: 1px 5px; margin-left: 2px; }
.multi { font-size: 10px; color: #4a6fa5; background: #e8f0fc; border-radius: 3px; padding: 1px 5px; margin-left: 2px; font-weight: 500; }
.note { display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; font-size: 11px; color: #b87000; background: #fdf3e0; border: 0.5px solid #e8c96a; border-radius: 4px; padding: 2px 7px; }
.alt-block { margin-top: 7px; padding: 6px 9px; background: #f5f0fa; border-left: 2px solid #9b6fc8; border-radius: 0 4px 4px 0; }
.alt-label { font-size: 9px; font-weight: 600; color: #9b6fc8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.alt-title { font-size: 12px; font-weight: 500; color: #1a1a18; text-decoration: none; }
.alt-title:hover { text-decoration: underline; text-underline-offset: 2px; }
.alt-meta { font-size: 11px; color: #888; margin-top: 2px; }
</style>

const VENUE_COLORS = {
  "Cinema Jolly":           "#7F77DD",
  "Lumière – Mastroianni":  "#1D9E75",
  "Lumière – Scorsese":     "#0F6E56",
  "Cinema Modernissimo":    "#D85A30",
  "Cinema Europa":          "#D4537E",
  "Cinema Arlecchino":      "#BA7517",
  "Piazza Maggiore":        "#378ADD",
  "Piazzetta Pasolini":     "#378ADD",
};

const DAY_LABELS = {
  "2026-06-20":"Sab 20/6","2026-06-21":"Dom 21/6","2026-06-22":"Lun 22/6",
  "2026-06-23":"Mar 23/6","2026-06-24":"Mer 24/6","2026-06-25":"Gio 25/6",
  "2026-06-26":"Ven 26/6","2026-06-27":"Sab 27/6","2026-06-28":"Dom 28/6",
};
const DAY_FULL = {
  "2026-06-20":"Sabato 20 giugno","2026-06-21":"Domenica 21 giugno","2026-06-22":"Lunedì 22 giugno",
  "2026-06-23":"Martedì 23 giugno","2026-06-24":"Mercoledì 24 giugno","2026-06-25":"Giovedì 25 giugno",
  "2026-06-26":"Venerdì 26 giugno","2026-06-27":"Sabato 27 giugno","2026-06-28":"Domenica 28 giugno",
};

const byDay = {};
ALL.forEach(s => { (byDay[s.date] = byDay[s.date]||[]).push(s); });
const dates = Object.keys(byDay).sort();
const today = new Date().toISOString().slice(0,10);
let activeDate = dates.includes(today) ? today : dates[0];

function renderTabs() {
  document.getElementById('tabs').innerHTML = dates.map(d => `
    <button class="tab ${d===activeDate?'active':''}" onclick="setDay('${d}')">
      ${DAY_LABELS[d]}<span class="cnt">${byDay[d].length}</span>
    </button>`).join('');
}

function renderDay() {
  const items = byDay[activeDate];
  document.getElementById('day-label').textContent = DAY_FULL[activeDate];
  document.getElementById('day-content').innerHTML = items.map(s => {
    const color = VENUE_COLORS[s.venue]||'#888';
    const titleEl = s.url
      ? `<a class="title-link" href="${s.url}" target="_blank" rel="noopener"><span class="title">${s.title}</span></a>`
      : `<span class="title">${s.title}</span>`;
    return `<div class="screening">
      <div class="time">${s.time}</div>
      <div>
        ${titleEl}
        <div class="meta">
          <span class="dot" style="background:${color}"></span>
          <span class="venue">${s.venue}</span>
          <span class="seat">· ${s.seat}</span>
          ${s.dur ? `<span class="dur">${s.dur}</span>` : ''}
          ${s.multi ? `<span class="multi">+film</span>` : ''}
        </div>
        ${s.note ? `<div><span class="note">${s.note}</span></div>` : ''}
        ${s.alt ? `<div class="alt-block">
          <div class="alt-label">⇄ alternativa</div>
          <a class="alt-title" href="${s.alt.url}" target="_blank" rel="noopener">${s.alt.time} · ${s.alt.title}</a>
          <div class="alt-meta">${s.alt.venue} · ${s.alt.dur}${s.alt.note ? ' · ' + s.alt.note : ''}</div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setDay(d) {
  activeDate = d;
  renderTabs();
  renderDay();
}

renderTabs();
renderDay();
</script>
