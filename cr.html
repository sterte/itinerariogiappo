<!DOCTYPE html>

<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
header { background: #1a1a18; color: #f5f4f0; padding: 1.5rem 2rem 1.25rem; }
header h1 { font-size: 20px; font-weight: 500; letter-spacing: 0.02em; }
header p { font-size: 12px; opacity: .5; margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
.stats { display: flex; gap: 10px; padding: 1rem 2rem; background: #1a1a18; border-top: 0.5px solid rgba(255,255,255,0.1); }
.stat { font-size: 12px; color: rgba(245,244,240,0.55); }
.stat strong { color: #f5f4f0; font-weight: 500; margin-right: 4px; }
.tabs-wrap { background: #fff; border-bottom: 0.5px solid #e0ddd6; overflow-x: auto; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; padding: 0 2rem; }
.tab { font-size: 12px; font-weight: 500; padding: 12px 14px; border: none; background: transparent; cursor: pointer; color: #888; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.12s; flex-shrink: 0; letter-spacing: 0.02em; }
.tab .cnt { font-size: 10px; font-weight: 400; opacity: .5; margin-left: 4px; }
.tab.active { color: #1a1a18; border-bottom-color: #1a1a18; }
.tab:hover:not(.active) { color: #1a1a18; background: #f5f4f0; }
.content { max-width: 720px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
.day-label { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
.screening { display: grid; grid-template-columns: 52px 1fr; gap: 0 14px; padding: 11px 0; border-bottom: 0.5px solid #e8e5df; align-items: start; }
.screening:last-child { border-bottom: none; }
.time { font-size: 14px; font-weight: 500; color: #1a1a18; padding-top: 2px; font-variant-numeric: tabular-nums; }
.title { font-size: 14px; font-weight: 500; color: #1a1a18; line-height: 1.4; }
.venue-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.venue { font-size: 12px; color: #666; }
.seat { font-size: 12px; color: #aaa; }
.note { display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; font-size: 11px; color: #c47a1a; background: #fdf3e3; border: 0.5px solid #f0d5a0; border-radius: 4px; padding: 3px 8px; }
.note svg { width: 11px; height: 11px; flex-shrink: 0; }
</style>
</head>

const VENUE_COLORS = {
  "Pop Up Cinema Jolly 4K": "#7F77DD",
  "Lumière – Mastroianni": "#1D9E75",
  "Lumière – Scorsese": "#0F6E56",
  "Cinema Modernissimo": "#D85A30",
  "Cinema Europa": "#D4537E",
  "Pop Up Cinema Arlecchino": "#BA7517",
  "Piazza Maggiore": "#378ADD",
  "Piazzetta Pasolini": "#378ADD",
};

const DAY_LABELS = {
  "2026-06-20": "Sab 20/6",
  "2026-06-21": "Dom 21/6",
  "2026-06-22": "Lun 22/6",
  "2026-06-23": "Mar 23/6",
  "2026-06-24": "Mer 24/6",
  "2026-06-25": "Gio 25/6",
  "2026-06-26": "Ven 26/6",
  "2026-06-27": "Sab 27/6",
  "2026-06-28": "Dom 28/6",
};

const DAY_FULL = {
  "2026-06-20": "Sabato 20 giugno",
  "2026-06-21": "Domenica 21 giugno",
  "2026-06-22": "Lunedì 22 giugno",
  "2026-06-23": "Martedì 23 giugno",
  "2026-06-24": "Mercoledì 24 giugno",
  "2026-06-25": "Giovedì 25 giugno",
  "2026-06-26": "Venerdì 26 giugno",
  "2026-06-27": "Sabato 27 giugno",
  "2026-06-28": "Domenica 28 giugno",
};

const byDay = {};
ALL.forEach(s => { (byDay[s.date] = byDay[s.date] || []).push(s); });
const dates = Object.keys(byDay).sort();

// default: oggi se presente, altrimenti primo giorno
const today = new Date().toISOString().slice(0,10);
let activeDate = dates.includes(today) ? today : dates[0];

document.getElementById('s-tot').textContent = ALL.length;
document.getElementById('s-days').textContent = dates.length;

function renderTabs() {
  document.getElementById('tabs').innerHTML = dates.map(d => `
    <button class="tab ${d === activeDate ? 'active' : ''}" onclick="setDay('${d}')">
      ${DAY_LABELS[d]}<span class="cnt">${byDay[d].length}</span>
    </button>
  `).join('');
}

function renderDay() {
  const items = byDay[activeDate];
  document.getElementById('day-label').textContent = DAY_FULL[activeDate];
  document.getElementById('day-content').innerHTML = items.map(s => `
    <div class="screening">
      <div class="time">${s.time}</div>
      <div>
        <div class="title">${s.title}</div>
        <div class="venue-row">
          <span class="dot" style="background:${VENUE_COLORS[s.venue] || '#888'}"></span>
          <span class="venue">${s.venue}</span>
          <span class="seat">· ${s.seat}</span>
        </div>
        ${s.note ? `<div><span class="note">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".5" fill="currentColor" stroke="none"/>
          </svg>
          ${s.note}
        </span></div>` : ''}
      </div>
    </div>
  `).join('');
}

function setDay(d) {
  activeDate = d;
  renderTabs();
  renderDay();
}

renderTabs();
renderDay();
</script>
